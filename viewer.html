<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Labs — Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

:root {
  --orange: #FF5500;
  --bg:     #0a0a0a;
  --bar-bg: rgba(10,10,10,0.96);
  --border: rgba(255,255,255,0.07);
  --text:   #ffffff;
  --text-sec: #888888;
  --text-ter: #555555;
  --input-bg: #161616;
  --surface: #111111;
  --drawer-bg: #0f0f0f;
}
[data-theme="light"] {
  --bg:     #f2f2f2;
  --bar-bg: rgba(242,242,242,0.96);
  --border: rgba(0,0,0,0.08);
  --text:   #0a0a0a;
  --text-sec: #666666;
  --text-ter: #999999;
  --input-bg: #ebebeb;
  --surface: #ffffff;
  --drawer-bg: #f8f8f8;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  transition: background 0.2s;
}

/* ─── TOP BAR ───────────────────────────────────────────────────────────── */
.viewer-bar {
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  background: var(--bar-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-sec);
  text-decoration: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 12px;
  background: var(--input-bg);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.back-btn:hover { color: var(--text); }

.bar-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}

.bar-logo {
  font-family: 'Inter', sans-serif;
  font-weight: 900;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-sec);
  text-decoration: none;
  flex-shrink: 0;
}
.bar-logo span { color: var(--orange); }

.bar-title {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  letter-spacing: -0.2px;
}

.bar-url {
  font-size: 11px;
  color: var(--text-sec);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 5px 10px;
  flex-shrink: 0;
}

.bar-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  align-items: center;
}

.bar-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  color: rgba(255,255,255,0.55);
  text-decoration: none;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
[data-theme="light"] .bar-btn { color: rgba(0,0,0,0.45); }
.bar-btn:hover { color: var(--text); }
.bar-btn.active {
  background: var(--orange);
  border-color: var(--orange);
  color: #fff;
}

.theme-toggle .icon-sun  { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="light"] .theme-toggle .icon-sun  { display: block; }
[data-theme="light"] .theme-toggle .icon-moon { display: none; }

/* ─── MAIN LAYOUT ───────────────────────────────────────────────────────── */
.viewer-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ─── IFRAME ─────────────────────────────────────────────────────────────── */
.viewer-frame {
  flex: 1;
  border: none;
  display: block;
  min-width: 0;
}

/* ─── DRAWER ─────────────────────────────────────────────────────────────── */
.viewer-drawer {
  width: 0;
  flex-shrink: 0;
  overflow: hidden;
  background: var(--drawer-bg);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width 0.3s ease;
}
.viewer-drawer.open { width: 360px; }

.drawer-inner {
  width: 360px;
  height: 100%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.drawer-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.drawer-category {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 8px;
}

.drawer-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
  line-height: 1.2;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.drawer-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.drawer-meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-sec);
}

.drawer-status {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 3px;
}

.drawer-body {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  flex: 1;
}

.drawer-section { display: flex; flex-direction: column; gap: 8px; }

.drawer-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-ter);
}

.drawer-desc {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.65;
}

.drawer-longdesc {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.8;
  white-space: pre-wrap;
}

.drawer-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.drawer-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--text-ter);
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 3px 8px;
}

/* ─── ERROR STATE ─────────────────────────────────────────────────────────── */
.viewer-error {
  display: none;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-sec);
  text-align: center;
  padding: 48px;
}
.viewer-error.visible { display: flex; }
.viewer-error h2 {
  font-size: 20px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text);
}
.viewer-error p { font-size: 14px; line-height: 1.6; max-width: 400px; }
.viewer-error a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #fff;
  background: var(--orange);
  border-radius: 4px;
  padding: 10px 20px;
  text-decoration: none;
  transition: opacity 0.2s;
}
.viewer-error a:hover { opacity: 0.85; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

</style>
</head>
<body>

<div class="viewer-bar">
  <button class="back-btn" onclick="window.close()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </button>

  <div class="bar-divider"></div>

  <a class="bar-logo" href="index.html"><span>SC</span> Labs</a>

  <div class="bar-divider"></div>

  <span class="bar-title" id="barTitle">—</span>

  <span class="bar-url" id="barUrl">—</span>

  <div class="bar-actions">
    <button class="bar-btn" id="drawerToggle" title="Project details">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="8" stroke-width="3" stroke-linecap="round"/>
        <line x1="12" y1="12" x2="12" y2="17"/>
      </svg>
    </button>
    <a class="bar-btn" id="openExternal" href="#" target="_blank" title="Open in new tab">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>
    <button class="bar-btn theme-toggle" id="themeToggle" title="Toggle theme">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</div>

<div class="viewer-body">
  <iframe class="viewer-frame" id="viewerFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>

  <div class="viewer-error" id="viewerError">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--border)">
      <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
    </svg>
    <h2>Can't load this page</h2>
    <p>This site may block embedding. Open it directly in a new tab instead.</p>
    <a id="errorLink" href="#" target="_blank">Open in new tab ↗</a>
  </div>

  <div class="viewer-drawer" id="viewerDrawer">
    <div class="drawer-inner">
      <div class="drawer-header">
        <div class="drawer-category" id="drawerCategory"></div>
        <div class="drawer-title" id="drawerTitle"></div>
        <div class="drawer-meta" id="drawerMeta"></div>
      </div>
      <div class="drawer-body" id="drawerBody"></div>
    </div>
  </div>
</div>

<script>
const params   = new URLSearchParams(location.search);
const title    = params.get('title')    || 'Prototype';
const url      = params.get('url')      || '';
const category = params.get('category') || '';
const author   = params.get('author')   || '';
const date     = params.get('date')     || '';
const status   = params.get('status')   || '';
const tagsRaw  = params.get('tags')     || '';
const desc     = params.get('desc')     || '';
const longDesc = params.get('longDesc') || '';

document.title = `${title} — SC Labs`;
document.getElementById('barTitle').textContent = title;
document.getElementById('barUrl').textContent   = url;
document.getElementById('openExternal').href    = url;
document.getElementById('errorLink').href       = url;

// ── Drawer content ────────────────────────────────────────────────────────
document.getElementById('drawerCategory').textContent = category;
document.getElementById('drawerTitle').textContent    = title;

const statusColors = { 'In Progress': '#FFB800', 'In Review': '#7B4FFF', 'Shipped': '#00C9A7' };
const statusColor  = statusColors[status] || '#888';
const metaEl       = document.getElementById('drawerMeta');

if (status) {
  const s = document.createElement('span');
  s.className = 'drawer-status';
  s.style.cssText = `background:${statusColor}18;color:${statusColor};border:1px solid ${statusColor}44`;
  s.textContent = status;
  metaEl.appendChild(s);
}
if (author) {
  const a = document.createElement('span');
  a.className = 'drawer-meta-item';
  a.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg> ${author}`;
  metaEl.appendChild(a);
}
if (date) {
  const d = document.createElement('span');
  d.className = 'drawer-meta-item';
  d.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${date}`;
  metaEl.appendChild(d);
}

const bodyEl = document.getElementById('drawerBody');

if (desc) {
  const sec = document.createElement('div');
  sec.className = 'drawer-section';
  sec.innerHTML = `<div class="drawer-section-label">Summary</div><div class="drawer-desc">${desc}</div>`;
  bodyEl.appendChild(sec);
}
if (longDesc) {
  const sec = document.createElement('div');
  sec.className = 'drawer-section';
  sec.innerHTML = `<div class="drawer-section-label">Description</div><div class="drawer-longdesc">${longDesc}</div>`;
  bodyEl.appendChild(sec);
}
if (tagsRaw) {
  const tags = tagsRaw.split(',').filter(Boolean);
  if (tags.length) {
    const sec = document.createElement('div');
    sec.className = 'drawer-section';
    sec.innerHTML = `<div class="drawer-section-label">Tags</div><div class="drawer-tags">${tags.map(t => `<span class="drawer-tag">${t.trim()}</span>`).join('')}</div>`;
    bodyEl.appendChild(sec);
  }
}

// ── Iframe ────────────────────────────────────────────────────────────────
const frame = document.getElementById('viewerFrame');
const error = document.getElementById('viewerError');

if (url) {
  frame.src = url;
  let loaded = false;
  frame.addEventListener('load', () => { loaded = true; });
  setTimeout(() => {
    if (!loaded) { frame.style.display = 'none'; error.classList.add('visible'); }
  }, 6000);
} else {
  frame.style.display = 'none';
  error.classList.add('visible');
}

// ── Drawer toggle ─────────────────────────────────────────────────────────
document.getElementById('drawerToggle').addEventListener('click', () => {
  const open = document.getElementById('viewerDrawer').classList.toggle('open');
  document.getElementById('drawerToggle').classList.toggle('active', open);
});

// ── Theme ─────────────────────────────────────────────────────────────────
const html  = document.documentElement;
const saved = localStorage.getItem('sc-labs-viewer-theme') || 'dark';
html.setAttribute('data-theme', saved);

document.getElementById('themeToggle').addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('sc-labs-viewer-theme', next);
});
</script>
</body>
</html>
