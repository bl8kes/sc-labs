<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Labs — Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

:root {
  --orange: #FF5500;
  --bg:     #0a0a0a;
  --bar-bg: rgba(10,10,10,0.96);
  --border: rgba(255,255,255,0.07);
  --text:   #ffffff;
  --text-sec: #888888;
  --input-bg: #161616;
}
[data-theme="light"] {
  --bg:     #f2f2f2;
  --bar-bg: rgba(242,242,242,0.96);
  --border: rgba(0,0,0,0.08);
  --text:   #0a0a0a;
  --text-sec: #666666;
  --input-bg: #ebebeb;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  transition: background 0.2s;
}

/* ─── TOP BAR ───────────────────────────────────────────────────────────── */
.viewer-bar {
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  background: var(--bar-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-sec);
  text-decoration: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 12px;
  background: var(--input-bg);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.back-btn:hover { color: var(--text); }

.bar-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}

.bar-logo {
  font-family: 'Inter', sans-serif;
  font-weight: 900;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-sec);
  text-decoration: none;
  flex-shrink: 0;
}
.bar-logo span { color: var(--orange); }

.bar-title {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  letter-spacing: -0.2px;
}

.bar-url {
  font-size: 11px;
  color: var(--text-sec);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 5px 10px;
  flex-shrink: 0;
}

.bar-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  align-items: center;
}

.bar-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-sec);
  text-decoration: none;
  transition: color 0.2s;
}
.bar-btn:hover { color: var(--text); }

.theme-toggle .icon-sun  { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="light"] .theme-toggle .icon-sun  { display: block; }
[data-theme="light"] .theme-toggle .icon-moon { display: none; }

/* ─── IFRAME ─────────────────────────────────────────────────────────────── */
.viewer-frame {
  flex: 1;
  width: 100%;
  border: none;
  display: block;
}

/* ─── ERROR STATE ─────────────────────────────────────────────────────────── */
.viewer-error {
  display: none;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-sec);
  text-align: center;
  padding: 48px;
}
.viewer-error.visible { display: flex; }
.viewer-error h2 {
  font-size: 20px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text);
}
.viewer-error p { font-size: 14px; line-height: 1.6; max-width: 400px; }
.viewer-error a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #fff;
  background: var(--orange);
  border-radius: 4px;
  padding: 10px 20px;
  text-decoration: none;
  transition: opacity 0.2s;
}
.viewer-error a:hover { opacity: 0.85; }

</style>
</head>
<body>

<div class="viewer-bar">
  <!-- Back -->
  <button class="back-btn" onclick="window.close()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </button>

  <div class="bar-divider"></div>

  <a class="bar-logo" href="index.html"><span>SC</span> Labs</a>

  <div class="bar-divider"></div>

  <span class="bar-title" id="barTitle">—</span>

  <span class="bar-url" id="barUrl">—</span>

  <div class="bar-actions">
    <!-- Open in new tab -->
    <a class="bar-btn" id="openExternal" href="#" target="_blank" title="Open in new tab">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>
    <!-- Theme toggle -->
    <button class="bar-btn theme-toggle" id="themeToggle" title="Toggle theme">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</div>

<iframe class="viewer-frame" id="viewerFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>

<div class="viewer-error" id="viewerError">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--border)">
    <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
  </svg>
  <h2>Can't load this page</h2>
  <p>This site may block embedding. Open it directly in a new tab instead.</p>
  <a id="errorLink" href="#" target="_blank">Open in new tab ↗</a>
</div>

<script>
// Read params
const params = new URLSearchParams(location.search);
const title  = params.get('title') || 'Prototype';
const url    = params.get('url')   || '';

document.title = `${title} — SC Labs`;
document.getElementById('barTitle').textContent = title;
document.getElementById('barUrl').textContent   = url;
document.getElementById('openExternal').href    = url;
document.getElementById('errorLink').href       = url;

const frame = document.getElementById('viewerFrame');
const error = document.getElementById('viewerError');

if (url) {
  frame.src = url;
  // Detect X-Frame-Options block (best-effort via load event timeout)
  let loaded = false;
  frame.addEventListener('load', () => { loaded = true; });
  setTimeout(() => {
    if (!loaded) {
      frame.style.display = 'none';
      error.classList.add('visible');
    }
  }, 6000);
} else {
  frame.style.display = 'none';
  error.classList.add('visible');
}

// Theme
const html  = document.documentElement;
const saved = localStorage.getItem('sc-labs-theme') || 'dark';
html.setAttribute('data-theme', saved);

document.getElementById('themeToggle').addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('sc-labs-theme', next);
});
</script>
</body>
</html>
